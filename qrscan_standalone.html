<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>QRスキャン</title>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jsQR/1.4.0/jsQR.min.js"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Hiragino Sans',sans-serif;background:#1c1c1e;color:#fff;min-height:100vh;display:flex;flex-direction:column}
    header{background:#000;padding:12px 16px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
    header h1{font-size:15px;font-weight:700}
    header span{font-size:11px;color:#aaa}

    /* カメラ */
    #camera-area{position:relative;width:100%;background:#000;overflow:hidden}
    #qr-video{width:100%;display:block;object-fit:cover}
    .overlay{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
    .frame{width:58%;aspect-ratio:1;border:3px solid #1a73e8;border-radius:12px;box-shadow:0 0 0 9999px rgba(0,0,0,0.5);position:relative;overflow:hidden}
    .line{position:absolute;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,#1a73e8,transparent);animation:scan 2s linear infinite}
    @keyframes scan{0%{top:0}100%{top:100%}}
    .hint{position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:12px;color:rgba(255,255,255,0.85)}
    #status-bar{position:absolute;top:8px;left:0;right:0;text-align:center;font-size:11px;font-weight:700;color:#fbbc04}

    #cam-error{display:none;padding:32px 20px;background:#2c2c2e;text-align:center}
    #cam-error p{color:#aaa;font-size:13px;line-height:1.8}
    #cam-error .err{color:#ea4335;font-size:11px;font-family:monospace;margin-top:6px}

    .content{flex:1;padding:14px;display:flex;flex-direction:column;gap:12px}
    .card{background:#2c2c2e;border-radius:12px;padding:14px}
    .card h3{font-size:13px;color:#aaa;margin-bottom:10px}
    .card.accent{border-left:4px solid #1a73e8}
    .row{display:flex;gap:8px}
    input.inp{flex:1;background:#1c1c1e;border:1.5px solid #444;border-radius:8px;padding:10px 12px;color:#fff;font-size:13px;font-family:inherit}
    input.inp:focus{outline:none;border-color:#1a73e8}
    .dl{display:grid;grid-template-columns:auto 1fr;gap:5px 10px;font-size:12px}
    .dl dt{color:#888} .dl dd{font-weight:700}
    .form-group{margin-bottom:10px}
    .lbl{display:block;font-size:11px;color:#aaa;margin-bottom:5px}
    .sbtns{display:flex;gap:8px}
    .sbtn{flex:1;padding:10px 4px;border-radius:8px;border:2px solid;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;background:transparent;color:#fff;transition:.2s}
    .sbtn[data-v="進行中"]{border-color:#1a73e8} .sbtn.sel[data-v="進行中"]{background:#1a73e8}
    .sbtn[data-v="完了"]{border-color:#34a853}   .sbtn.sel[data-v="完了"]{background:#34a853}
    .sbtn[data-v="一時停止"]{border-color:#fbbc04} .sbtn.sel[data-v="一時停止"]{background:#fbbc04;color:#000}
    .submit-btn{width:100%;padding:15px;background:#1a73e8;color:#fff;border:none;border-radius:12px;font-family:inherit;font-size:15px;font-weight:700;cursor:pointer}
    .submit-btn:disabled{background:#444;cursor:not-allowed}
    .cancel-btn{width:100%;padding:11px;background:transparent;color:#aaa;border:1.5px solid #444;border-radius:12px;font-family:inherit;font-size:13px;cursor:pointer;margin-top:10px}
    .hist{display:flex;align-items:center;gap:8px;padding:7px 0;border-bottom:1px solid #3a3a3c;font-size:11px}
    .hist:last-child{border:none}
    .badge{padding:2px 7px;border-radius:10px;font-size:10px;font-weight:700;flex-shrink:0}
    .done{background:#34a85333;color:#34a853} .prog{background:#1a73e833;color:#1a73e8}
    .hidden{display:none!important}

    /* 設定パネル */
    #cfg-panel{background:#111;padding:12px 16px;border-bottom:1px solid #333;display:flex;align-items:center;gap:8px;flex-wrap:wrap}
    #cfg-panel label{font-size:11px;color:#aaa}
    #cfg-url{flex:1;min-width:180px;background:#2c2c2e;border:1.5px solid #444;border-radius:6px;padding:7px 10px;color:#fff;font-size:11px;font-family:monospace}
    #cfg-url:focus{outline:none;border-color:#1a73e8}
    #cfg-save{background:#1a73e8;border:none;color:#fff;border-radius:6px;padding:7px 12px;font-family:inherit;font-size:12px;font-weight:700;cursor:pointer}
  </style>
</head>
<body>
<header>
  <h1>📷 QR工程スキャナー</h1>
  <span id="clock"></span>
</header>

<!-- GAS URL設定バー -->
<div id="cfg-panel">
  <label>GAS URL:</label>
  <input type="text" id="cfg-url" placeholder="https://script.google.com/macros/s/.../exec">
  <button id="cfg-save" onclick="saveConfig()">保存</button>
</div>

<!-- カメラ -->
<div id="camera-area">
  <video id="qr-video" autoplay playsinline muted></video>
  <canvas id="qr-canvas" style="display:none"></canvas>
  <div class="overlay">
    <div class="frame"><div class="line"></div></div>
    <div class="hint">QRコードをフレーム内に合わせてください</div>
    <div id="status-bar">カメラ起動中...</div>
  </div>
</div>
<div id="cam-error">
  <p>📷<br>カメラを起動できませんでした<br>
  ブラウザのアドレスバー横の🔒をクリックしてカメラ許可を確認してください</p>
  <p class="err" id="err-detail"></p>
</div>

<div class="content">
  <!-- 手動入力 -->
  <div class="card">
    <h3>🔤 手動入力（スキャン代替）</h3>
    <div class="row">
      <input class="inp" type="text" id="manual-input" placeholder='{"type":"PROCESS","planId":"PLAN-..."}'>
      <button class="sbtn" style="flex:0;min-width:auto;padding:10px 14px;border-color:#1a73e8;color:#1a73e8" onclick="processQR(document.getElementById('manual-input').value)">読込</button>
    </div>
  </div>

  <!-- 計画情報 -->
  <div class="card accent hidden" id="plan-card">
    <h3>📋 計画情報</h3>
    <dl class="dl" id="plan-dl"></dl>
  </div>

  <!-- 実績入力フォーム -->
  <div class="card hidden" id="form-card">
    <h3>✏️ 実績入力</h3>
    <div class="form-group">
      <label class="lbl">作業者名 *</label>
      <input class="inp" style="width:100%" id="f-op" placeholder="あなたの名前">
    </div>
    <div class="form-group">
      <label class="lbl">実績数量</label>
      <input type="number" class="inp" style="width:100%" id="f-qty" placeholder="0">
    </div>
    <div class="form-group">
      <label class="lbl">ステータス *</label>
      <div class="sbtns">
        <button class="sbtn" data-v="進行中"   onclick="selStatus(this)">▶ 開始</button>
        <button class="sbtn" data-v="完了"     onclick="selStatus(this)">✓ 完了</button>
        <button class="sbtn" data-v="一時停止" onclick="selStatus(this)">⏸ 停止</button>
      </div>
    </div>
    <div class="form-group">
      <label class="lbl">備考</label>
      <input class="inp" style="width:100%" id="f-notes" placeholder="特記事項">
    </div>
    <button class="submit-btn" id="send-btn" onclick="send()">📤 実績を送信</button>
    <button class="cancel-btn" onclick="reset()">キャンセル・別のQRを読む</button>
  </div>

  <!-- 履歴 -->
  <div class="card hidden" id="hist-card">
    <h3>📂 実績履歴</h3>
    <div id="hist-list"></div>
  </div>
</div>

<script>
// ===== 設定 =====
var GAS_URL = localStorage.getItem('qr_gas_url') || '';
var planId = '', process = '', status = '', stream = null, timer = null, last = '';

function saveConfig() {
  GAS_URL = document.getElementById('cfg-url').value.trim();
  localStorage.setItem('qr_gas_url', GAS_URL);
  Swal.fire({toast:true,position:'top',icon:'success',title:'URLを保存しました',showConfirmButton:false,timer:1500,background:'#2c2c2e',color:'#fff'});
}

// 保存済みURLがあればセット
if (GAS_URL) document.getElementById('cfg-url').value = GAS_URL;

// 時計
(function tick(){
  document.getElementById('clock').textContent = new Date().toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'});
  setTimeout(tick,30000);
})();

// ===== カメラ =====
function startCamera() {
  document.getElementById('status-bar').textContent = 'カメラ起動中...';
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    showError('お使いのブラウザはカメラAPIに対応していません');
    return;
  }
  navigator.mediaDevices.getUserMedia({video:{facingMode:{ideal:'environment'}}})
    .then(function(s) {
      stream = s;
      var v = document.getElementById('qr-video');
      v.srcObject = s; v.play();
      document.getElementById('camera-area').style.display = 'block';
      document.getElementById('cam-error').style.display = 'none';
      document.getElementById('status-bar').textContent = 'スキャン待機中...';
      startScan();
    })
    .catch(function(err) { showError(err.name + ': ' + err.message); });
}

function showError(msg) {
  document.getElementById('camera-area').style.display = 'none';
  document.getElementById('cam-error').style.display = 'block';
  document.getElementById('err-detail').textContent = msg;
}

function startScan() {
  var v = document.getElementById('qr-video');
  var c = document.getElementById('qr-canvas');
  var ctx = c.getContext('2d');
  timer = setInterval(function() {
    if (v.readyState < v.HAVE_ENOUGH_DATA) return;
    c.width = v.videoWidth; c.height = v.videoHeight;
    ctx.drawImage(v, 0, 0, c.width, c.height);
    if (typeof jsQR === 'undefined') return;
    var code = jsQR(ctx.getImageData(0,0,c.width,c.height).data, c.width, c.height, {inversionAttempts:'dontInvert'});
    if (code && code.data && code.data !== last) {
      last = code.data;
      document.getElementById('status-bar').textContent = 'QR検出！';
      processQR(code.data);
    }
  }, 300);
}

function stopCamera() {
  if (timer) { clearInterval(timer); timer = null; }
  if (stream) { stream.getTracks().forEach(function(t){t.stop();}); stream = null; }
}

// ===== QR処理 =====
function processQR(text) {
  if (!text) return;
  var d;
  try { d = JSON.parse(text.trim()); } catch(e) {
    document.getElementById('status-bar').textContent = '形式エラー'; return;
  }
  if (d.type === 'PROCESS') { stopCamera(); loadPlan(text.trim()); }
  else if (d.type === 'FINISHED') {
    stopCamera();
    Swal.fire({icon:'info',title:'完成品',html:'品番: '+d.itemCode+'<br>数量: '+d.quantity,background:'#2c2c2e',color:'#fff'})
      .then(reset);
  }
  else { document.getElementById('status-bar').textContent = '未対応QR'; }
}

// ===== API呼び出し =====
function apiCall(params) {
  if (!GAS_URL) {
    return Promise.reject(new Error('GAS URLが設定されていません。上部のURLバーに設定してください。'));
  }
  var url = GAS_URL + '?' + Object.keys(params).map(function(k){
    return k + '=' + encodeURIComponent(params[k]);
  }).join('&');
  return fetch(url).then(function(r){ return r.json(); });
}

function loadPlan(qrJson) {
  Swal.fire({title:'取得中...',allowOutsideClick:false,didOpen:function(){Swal.showLoading();}});
  apiCall({action:'getPlanInfo', qrJson:qrJson})
    .then(function(r) {
      Swal.close();
      if (!r.success) { Swal.fire({icon:'error',title:'エラー',text:r.message,background:'#2c2c2e',color:'#fff'}); return; }
      showPlan(r.plan, r.history);
    })
    .catch(function(e) {
      Swal.close();
      Swal.fire({icon:'error',title:'通信エラー',text:e.message,background:'#2c2c2e',color:'#fff'});
    });
}

function showPlan(p, hist) {
  planId = p['計画ID']; process = p['工程名'];
  document.getElementById('plan-dl').innerHTML =
    '<dt>計画ID</dt><dd>'+p['計画ID']+'</dd>'+
    '<dt>社内品番</dt><dd>'+(p['社内品番']||'-')+'</dd>'+
    '<dt>品名</dt><dd>'+(p['品名']||'-')+'</dd>'+
    '<dt>工程</dt><dd style="color:#1a73e8">'+(p['工程名']||'-')+'</dd>'+
    '<dt>期間</dt><dd>'+(p['計画開始日']||'')+'～'+(p['計画終了日']||'-')+'</dd>'+
    '<dt>状態</dt><dd>'+(p['状態']||'-')+'</dd>';
  show('plan-card'); show('form-card');
  if (hist && hist.length) {
    document.getElementById('hist-list').innerHTML = hist.slice(0,5).map(function(h){
      return '<div class="hist"><span class="badge '+(h.status==='完了'?'done':'prog')+'">'+h.status+'</span><span>'+h.operator+'</span><span style="margin-left:auto;color:#888">'+h.date+'</span></div>';
    }).join('');
    show('hist-card');
  }
  document.getElementById('form-card').scrollIntoView({behavior:'smooth'});
}

function selStatus(btn) {
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('sel');});
  btn.classList.add('sel'); status = btn.dataset.v;
}

function send() {
  var op = document.getElementById('f-op').value.trim();
  var qty = document.getElementById('f-qty').value;
  var notes = document.getElementById('f-notes').value;
  if (!op)     { Swal.fire({icon:'warning',title:'作業者名を入力',background:'#2c2c2e',color:'#fff'}); return; }
  if (!status) { Swal.fire({icon:'warning',title:'ステータスを選択',background:'#2c2c2e',color:'#fff'}); return; }
  document.getElementById('send-btn').disabled = true;
  Swal.fire({title:'送信中...',allowOutsideClick:false,didOpen:function(){Swal.showLoading();}});
  apiCall({action:'submitProgress', data:JSON.stringify({planId:planId,processName:process,operator:op,actualQty:qty?Number(qty):0,status:status,notes:notes})})
    .then(function(r) {
      Swal.close(); document.getElementById('send-btn').disabled = false;
      if (!r.success) { Swal.fire({icon:'error',title:'エラー',text:r.message,background:'#2c2c2e',color:'#fff'}); return; }
      Swal.fire({icon:'success',title:'登録完了！',html:'<strong>'+process+'</strong> の実績を送信',background:'#2c2c2e',color:'#fff',timer:2000,timerProgressBar:true}).then(reset);
    })
    .catch(function(e) {
      Swal.close(); document.getElementById('send-btn').disabled = false;
      Swal.fire({icon:'error',title:'通信エラー',text:e.message,background:'#2c2c2e',color:'#fff'});
    });
}

function reset() {
  planId=''; process=''; status=''; last='';
  hide('plan-card'); hide('form-card'); hide('hist-card');
  document.getElementById('plan-dl').innerHTML='';
  document.getElementById('hist-list').innerHTML='';
  ['f-op','f-qty','f-notes','manual-input'].forEach(function(id){document.getElementById(id).value='';});
  document.querySelectorAll('.sbtn').forEach(function(b){b.classList.remove('sel');});
  document.getElementById('status-bar').textContent='スキャン待機中...';
  startCamera();
}

function show(id){document.getElementById(id).classList.remove('hidden');}
function hide(id){document.getElementById(id).classList.add('hidden');}

startCamera();
</script>
</body>
</html>
